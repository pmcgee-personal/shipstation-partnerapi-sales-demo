service: shipstation-partnerapi-sales-demo

provider:
  name: aws
  runtime: nodejs22.x
  region: us-west-2
  stage: dev

  # For backwards-compatibility with Serverless v2, we declare permissions here:
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:Scan
        - dynamodb:UpdateItem # Permission to update records for adding/deleting ship vias
      Resource:
        - arn:aws:dynamodb:*:*:table/shipstation-partnerapi-demo-accounts
    - Effect: Allow
      Action:
        - ssm:GetParameter
      Resource:
        - arn:aws:ssm:*:*:parameter/shipstation-demo/*

# We will define our Lambda endpoints here.
functions:
  createAccount:
    handler: handler.createAccount
    events:
      - http:
          path: api/accounts
          method: post
          cors: true

  listAccounts:
    handler: handler.listAccounts
    events:
      - http:
          path: api/accounts
          method: get
          cors: true

  # New endpoint to get a single account's details, including ship vias
  getAccount:
    handler: handler.getAccount
    events:
      - http:
          path: api/accounts/{accountId}
          method: get
          cors: true

  directLogin:
    handler: handler.directLogin
    events:
      - http:
          path: api/direct-login
          method: post
          cors: true

  listCarriers:
    handler: handler.listCarriers
    events:
      - http:
          path: api/carriers/{accountId}
          method: get
          cors: true

  listWarehouses:
    handler: handler.listWarehouses
    events:
      - http:
          path: api/warehouses/{accountId}
          method: get
          cors: true

  createWarehouse:
    handler: handler.createWarehouse
    events:
      - http:
          path: api/warehouses/{accountId}
          method: post
          cors: true

  # --- SHIP VIA ENDPOINTS ---
  addShipVia:
    handler: handler.addShipVia
    events:
      - http:
          path: api/accounts/{accountId}/shipvia
          method: post
          cors: true

  deleteShipVia:
    handler: handler.deleteShipVia
    events:
      - http:
          path: api/accounts/{accountId}/shipvia/{shipViaCode}
          method: delete
          cors: true
